# Reproduces the shipped RobotoMono-Regular.fnt (the plugin's body font).
# This is the non-normalised reference baseline (see tools/mxbmrp3_fontgen/test.sh):
# a high-resolution 135px cell with a mip-safe 20px inter-glyph gap. The 20px gap
# keeps a neighbouring glyph from bleeding across when the mipmapped atlas is
# minified for small HUD text (a 4px gap showed as a faint bar hugging the edge).
#   tools/mxbmrp3_fontgen/mxbmrp3_fontgen tools/mxbmrp3_fontgen/examples/RobotoMono-Regular.cfg RobotoMono-Regular.fnt
[config]
name        = Roboto Mono Regular
code_page   = 1252
char_start  = 32
char_end    = 255
bitmap_x    = 512
bitmap_y    = 512
spacing     = 20
cell_height = 135
filename    = mxbmrp3_data/web/fonts/RobotoMono-Regular.ttf
