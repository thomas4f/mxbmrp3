# Reproduces the shipped RobotoMono-Regular.fnt (the plugin's body font).
#   tools/mxbmrp3_fontgen/mxbmrp3_fontgen tools/mxbmrp3_fontgen/examples/RobotoMono-Regular.cfg RobotoMono-Regular.fnt
[config]
name        = Roboto Mono Regular
code_page   = 1252
char_start  = 32
char_end    = 255
bitmap_x    = 512
bitmap_y    = 512
spacing     = 4
cell_height = 45
filename    = mxbmrp3_data/web/fonts/RobotoMono-Regular.ttf
