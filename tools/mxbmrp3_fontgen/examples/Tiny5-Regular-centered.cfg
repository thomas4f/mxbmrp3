# Tiny5, vertically centred so its digits sit centred on the number plate.
# The stock fontgen bakes Tiny5's cap/digit band ~7% off-centre (the cell
# reserves deep-descender room the digits don't use); `center = 1` fixes it.
#   tools/mxbmrp3_fontgen/mxbmrp3_fontgen tools/mxbmrp3_fontgen/examples/Tiny5-Regular-centered.cfg Tiny5-Regular.fnt
[config]
name        = Tiny5 Regular
code_page   = 1252
char_start  = 32
char_end    = 255
bitmap_x    = 512
bitmap_y    = 512
spacing     = 4
cell_height = 45
center      = 1
filename    = mxbmrp3_data/web/fonts/Tiny5-Regular.ttf
