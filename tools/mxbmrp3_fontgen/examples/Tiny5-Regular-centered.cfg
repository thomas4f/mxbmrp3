# Reproduces the shipped Tiny5-Regular.fnt — the number-plate font, generated the
# normalised way (like regen_shipped.sh). `normalize = 1` applies the standard
# defaults: 135px cell, 0.489 digit-advance, a mip-safe 20px inter-glyph gap, and
# vertical centring. Centring matters here because the stock fontgen bakes Tiny5's
# cap/digit band ~7% off-centre (the cell reserves deep-descender room the digits
# don't use), which would otherwise float the number high on the plate.
#   tools/mxbmrp3_fontgen/mxbmrp3_fontgen tools/mxbmrp3_fontgen/examples/Tiny5-Regular-centered.cfg Tiny5-Regular.fnt
[config]
name        = Tiny5 Regular
code_page   = 1252
char_start  = 32
char_end    = 255
bitmap_x    = 512
bitmap_y    = 512
normalize   = 1
filename    = mxbmrp3_data/web/fonts/Tiny5-Regular.ttf
