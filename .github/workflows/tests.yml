# ============================================================================
# CI (Linux). The shipping plugin is built with MSVC (mxbmrp3.sln) and is NOT
# built here. These jobs guard the platform-independent logic on Linux:
#
#   unit-tests        — pure-logic unit tests (color math, formatting, parsing);
#                       just a C++17 compiler. Runs on every push.
#   web-overlay       — drive the web overlay's ?demo mode in headless Chromium
#                       (Playwright) and assert the rendered DOM. Node only, no
#                       Wine. Gated to PRs / main / manual.
#   cross-build-smoke — cross-compile the whole plugin to a Windows DLL with
#                       mingw-w64 and run the headless test suite under Wine:
#                       the doctest integration tests (tests/integration/tests/ — smoke
#                       lifecycle, race standings/gaps/DSQ, multi-session logic,
#                       auto-director battles, reset scope, version ordering),
#                       then the specialized modalities (settings persistence,
#                       config/callback fuzzing, CPU perf baseline, and the NSIS
#                       installer mechanics — makensis-built Setup.exe driven
#                       headless under Wine). Each drives the real callbacks and
#                       asserts the plugin's own /api/state JSON (or, for the
#                       installer, the on-disk + registry outcomes). Catches
#                       portability breakage AND logic regressions in the real
#                       init/adapter/PluginData/HUD/HTTP pipeline, no game or
#                       Windows needed. See tests/integration/ and TESTING.md.
#
# WHERE THESE RUN (metered private repo + free public mirror):
#   • PUBLIC mirror (thomas4f/mxbmrp3): Actions are FREE, so every job runs
#     AUTOMATICALLY on push/PR there — that's where continuous testing happens.
#     The mirror.yml squash (workflows included) is what lands commits on public.
#   • This PRIVATE repo: nothing runs automatically. A push/PR still creates a
#     workflow run, but every job's `if:` gate SKIPS it (a skipped job allocates
#     no runner → zero billable minutes). Trigger the suite by hand via
#     "Run workflow" (workflow_dispatch) when you want to check before mirroring.
#   • RELEASE gate (release.yml → workflow_call): always runs — a release is
#     deliberate and must be validated.
#   • The Windows MSVC ASan job needs its own opt-in (asan_msvc) in the private/
#     manual path — nothing is free in the metered private repo (Linux draws the
#     monthly quota at 1x), and a Windows runner burns it at a 2x multiplier, so it
#     is gated the tightest; it runs free in public like everything else.
# The shared gate below is repeated per job (Actions has no workflow-level `if`).
# ============================================================================
name: tests

on:
  # Only `main` (not every branch): in the public mirror the mirror.yml squash lands
  # on main, which is what should auto-run there; in the private repo a feature-branch
  # push then creates NO run at all (it would only skip via the gates anyway), which
  # keeps the Actions tab clean. Manual `Run workflow` still works from any branch.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # allow running the full suite on a branch on demand
    inputs:
      asan_msvc:
        description: "Also run the Windows MSVC AddressSanitizer job (spends Windows minutes)."
        type: boolean
        default: false
  workflow_call:            # let release.yml run this as a pre-release gate
    inputs:
      full:
        description: "Force every job to run (used by the release gate)."
        type: boolean
        default: false
      asan_msvc:
        description: "Run the Windows MSVC AddressSanitizer job. Off by default so it never auto-spends Windows minutes."
        type: boolean
        default: false

# Cancel an in-progress run when a newer commit is pushed to the same ref, so
# rapid iterative pushes don't pile up runs. (Each ref keeps only its latest.)
# When run as the release gate (inputs.full), key by run_id instead so an
# unrelated push to the same ref can't cancel the release's test run.
concurrency:
  group: ci-${{ inputs.full && github.run_id || github.ref }}
  cancel-in-progress: true

# Least privilege: these jobs only check out and run tests — no writes. (When
# release.yml calls this workflow as its gate, that job keeps read-only too; the
# release job scopes its own contents:write separately.)
permissions:
  contents: read

jobs:
  # Fast feedback: pure logic, seconds, just a compiler. Runs in parallel with
  # the heavier Wine job below so a logic break surfaces almost immediately.
  unit-tests:
    name: Pure-logic unit tests
    # Shared gate: auto in the free public mirror; manual/release-gate only in the
    # metered private repo (skipped here on a plain push/PR → zero minutes).
    if: >-
      github.event.repository.private == false ||
      github.event_name == 'workflow_dispatch' ||
      inputs.full
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Compiler version
        run: g++ --version

      - name: Build & run tests
        run: ./tests/unit/run_tests.sh

      # The portable .fnt font generator must keep reproducing the shipped
      # bitmap fonts (structure/metrics/atlas) — regression guard for the tool.
      - name: Font generator (mxbmrp3_fontgen) regression
        run: ./tools/mxbmrp3_fontgen/test.sh

  # Native AddressSanitizer + UBSan over the plugin's portable memory surface
  # (fixed buffers, the leader-timing index clamp, the crash-site container
  # types). Fast (seconds, just libasan), so it gates every push alongside the
  # unit tests — a heap/stack overflow in that surface faults here instead of
  # shipping. The faithful full-callback ASan pass is the MSVC path (Windows);
  # see tests/asan/README.md. Distinct job so an ASan report is legible on its own.
  memory-safety:
    name: Memory safety (ASan/UBSan)
    if: >-
      github.event.repository.private == false ||
      github.event_name == 'workflow_dispatch' ||
      inputs.full
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      # The whole portable-logic unit suite, rebuilt under ASan+UBSan — covers
      # everything those tests already exercise (sanitizeUntrusted, fitText,
      # formatting/parsing, session-charts math, config parsing, …), not just the
      # targeted harness below.
      - name: Unit suite under ASan/UBSan
        run: ASAN=1 ./tests/unit/run_tests.sh

      # Targeted harness for the fixed-buffer / index surface behind the two
      # shipped heap-corruption crashes (RaceEntryData buffers, the leader-timing
      # index clamp, the crash-site container types).
      - name: Targeted memory-safety harness
        run: ./tests/asan/run.sh

  web-overlay:
    name: Web overlay (Playwright)
    # Shared gate: auto in the free public mirror; manual/release-gate only in private.
    if: >-
      github.event.repository.private == false ||
      github.event_name == 'workflow_dispatch' ||
      inputs.full
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tests/web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Cache the downloaded Chromium across runs, keyed on the pinned Playwright
      # version (which determines the browser revision).
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/web/package-lock.json') }}

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run overlay tests
        run: npm test

  cross-build-smoke:
    name: Cross-compile (mingw) + run under Wine
    # The heavy job (~4-8 min). Shared gate: it runs automatically (free) in the
    # public mirror, and only on manual dispatch / the release gate in the metered
    # private repo — never on a plain private push/PR.
    if: >-
      github.event.repository.private == false ||
      github.event_name == 'workflow_dispatch' ||
      inputs.full
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v7

      - name: Install mingw-w64 + Wine
        run: |
          sudo apt-get update -qq
          # Everything here is 64-bit: the plugin cross-builds to an x86_64 DLL, the
          # test harnesses are x86_64, and the NSIS installer is amd64. So we install
          # 64-bit Wine ONLY — no i386 architecture, no wine32:i386. Beyond slimming the
          # install (libwine:i386 alone is a ~100 MB download every run), dropping the
          # 32-bit side is a correctness fix: with wine32 present, Debian's /usr/bin/wine
          # wrapper prefers the 32-bit loader, whose reg.exe reads the WOW6432Node-
          # redirected view and can't see the amd64 installer's 64-bit registry keys —
          # which silently broke the installer test's HKLM assertions.
          # `wine` provides the /usr/bin/wine launcher; `wine64` alone (Ubuntu's
          # 9.0 repack) ships only libwine, no launcher — which is why the Wine
          # test job had been silently failing at "wine not found".
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 ccache wine wine64 nsis
          # std::thread/std::mutex require the posix threading variant.
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          # Fail loudly HERE if the launcher still isn't on PATH, rather than
          # letting every downstream test skip with "wine not found".
          if ! command -v wine >/dev/null; then
            for c in /usr/lib/wine/wine64 /usr/lib/x86_64-linux-gnu/wine/wine64; do
              [ -x "$c" ] && { sudo ln -sf "$c" /usr/bin/wine; break; }
            done
          fi
          wine --version

      # Persist ccache across runs so the 117-TU cross-build is near-instant when
      # unchanged (the Makefile wraps the compiler in ccache). Content-hashed, so
      # the sha-keyed save + prefix restore-key is the standard pattern.
      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Cross-compile plugin -> Windows DLL
        run: ./tests/integration/build.sh

      # The build above (and the whole Wine suite) compiles ONLY the MX Bikes config,
      # where every GAME_HAS_* feature is on. Syntax-check the shared sources under the
      # GP Bikes / Kart Racing Pro defines too, so a compile error that only appears when
      # a feature macro is OFF fails here instead of in a manual MSVC release build (e.g.
      # a GAME_HAS_*-gated include whose type is used unconditionally).
      - name: Syntax-check GPB/KRP game configs
        run: ./tests/integration/check_game_configs.sh

      # Every doctest integration test in tests/integration/tests/ (smoke lifecycle,
      # race standings/gaps/DSQ, multi-session business logic, auto-director
      # battle detection, Reset All scope, update-checker version ordering). Each
      # loads the DLL under Wine, drives the real callbacks / test hooks, and
      # asserts the plugin's own /api/state JSON or re-saved settings.ini. One
      # runner, one step; failures gate on exit code.
      - name: Integration tests (doctest + Wine)
        run: ./tests/integration/run_tests.sh

      - name: Settings persistence round-trip (user changes must survive restart)
        run: ./tests/integration/run_persist_test.sh

      - name: Fuzz config files (malformed settings/JSON must not crash)
        run: ./tests/integration/run_fuzz.sh

      - name: Fuzz DLL-boundary callbacks (adversarial sizes/counts must not crash)
        run: ./tests/integration/run_fuzz_callbacks.sh

      - name: CPU performance baseline (report + gross-regression gate)
        run: ./tests/integration/run_perf.sh

      # Build the NSIS installer and drive Setup.exe + uninstaller headless under
      # Wine, asserting the install/uninstall/registry/data-wipe mechanics. Uses
      # makensis (nsis) + wine; independent of the plugin DLL build above.
      - name: Installer mechanics (makensis + Wine)
        run: ./tests/integration/run_installer_test.sh

  # Faithful memory-safety pass: the REAL shipping DLL under MSVC AddressSanitizer,
  # driven through the real DLL-boundary callbacks by callback_fuzzer. Unlike the
  # native memory-safety job (portable surface only), this instruments the whole
  # plugin — the live PluginData / StatsManager / HUD / HttpServer pipeline the two
  # shipped heap-corruption crashes live in — so an out-of-bounds write or
  # use-after-free anywhere the fuzzer reaches faults AT the write, with the stack.
  # Windows-only (MSVC ASan); heavy, so gated like the other build jobs. Uses the
  # MXB-Debug config, which is exempt from the Release analytics-key requirement, so
  # no secrets are needed. See tests/asan/README.md.
  memory-safety-msvc:
    name: Memory safety (MSVC ASan, real DLL)
    # Auto in the free public mirror (Windows Actions are free there too); in the
    # metered private repo it's OPT-IN only — a Windows runner carries a 2x minute
    # multiplier, so it never runs on a plain push/PR/dispatch there unless you tick
    # "Also run the Windows MSVC AddressSanitizer job" on Run workflow. The native
    # Linux memory-safety job covers the portable surface without it.
    if: >-
      github.event.repository.private == false ||
      inputs.asan_msvc
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # Full x64 developer environment (cl, msbuild, and — critically — the ASan
      # runtime clang_rt.asan_dynamic-x86_64.dll on PATH so the instrumented DLL +
      # fuzzer load it). Persists to later steps via GITHUB_ENV/GITHUB_PATH.
      - name: Set up MSVC x64 dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Build the MX Bikes DLL with /fsanitize=address. EnableASAN is the documented
      # MSBuild switch; BasicRuntimeChecks=Default drops the Debug config's /RTC
      # (incompatible with ASan) and LinkIncremental=false satisfies ASan's linker
      # requirement — set explicitly so the build doesn't depend on the toolset
      # auto-stripping them.
      - name: Build MX Bikes DLL with AddressSanitizer (MXB-Debug)
        shell: pwsh
        run: >-
          msbuild mxbmrp3.sln
          /p:Configuration=MXB-Debug /p:Platform=x64
          /p:EnableASAN=true /p:BasicRuntimeChecks=Default /p:LinkIncremental=false
          /m /v:minimal

      # /MDd (dynamic debug CRT) matches the DLL build: the MXB-Debug DLL is forced
      # to /MDd under ASan by mxbmrp3/Directory.Build.targets, so both modules share
      # the single clang_rt.asan_dynamic-x86_64.dll. Static ASan (/MTd) is per-module
      # and fails to load across the fuzzer→DLL LoadLibrary boundary on recent MSVC
      # toolsets with error 127 (ERROR_PROC_NOT_FOUND) — see tests/asan/README.md's
      # ASan-runtime note.
      - name: Build boundary fuzzer with AddressSanitizer
        shell: pwsh
        run: cl /nologo /std:c++17 /MDd /EHsc /Zi /fsanitize=address tests\integration\callback_fuzzer.cpp /Fe:callback_fuzzer.exe

      # Drive the real callbacks against the ASan DLL. A native temp savepath (arg 3)
      # replaces the fuzzer's Wine-only Z:\ default. Exit code is the fuzzer's:
      # ASan aborts non-zero on any violation, failing the job with the culprit stack.
      - name: Run boundary fuzzer under ASan
        shell: pwsh
        env:
          ASAN_OPTIONS: abort_on_error=1:halt_on_error=1:print_stats=1
        run: |
          $save = Join-Path $env:RUNNER_TEMP "mxbfuzz\"
          New-Item -ItemType Directory -Force -Path $save | Out-Null
          $dll = "build\MXB-Debug\mxbmrp3.dlo"
          if (-not (Test-Path $dll)) { Write-Error "ASan DLL not found at $dll"; exit 1 }
          # The /MDd fuzzer + DLL resolve the dynamic ASan runtime and the DYNAMIC
          # debug CRT DLLs at LoadLibrary time. Stage each next to the fuzzer so the
          # load can't fail on a missing dependency: the ASan runtime + VC debug CRTs
          # (vcruntime140d/msvcp140d) live in the VC toolset/redist, the debug UCRT
          # (ucrtbased.dll) in the Windows SDK. Best-effort search of both roots; the
          # step never fails on a miss (a genuinely absent DLL surfaces as a clear
          # error 126 from the fuzzer load instead).
          $vcbin = Split-Path (Get-Command cl.exe).Source
          $roots = @($vcbin, $env:VCToolsRedistDir, $env:VCINSTALLDIR,
                     $env:WindowsSdkDir, $env:UniversalCRTSdkDir) |
                   Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique
          foreach ($name in @('clang_rt.asan_dynamic-x86_64.dll','vcruntime140d.dll',
                              'vcruntime140_1d.dll','msvcp140d.dll','ucrtbased.dll')) {
            if (Test-Path $name) { continue }
            foreach ($root in $roots) {
              $hit = Get-ChildItem -Path $root -Recurse -File -Filter $name -ErrorAction SilentlyContinue |
                     Select-Object -First 1
              if ($hit) { Copy-Item $hit.FullName . -Force; Write-Host "staged $name from $($hit.DirectoryName)"; break }
            }
          }
          .\callback_fuzzer.exe $dll 1000000 $save
          if ($LASTEXITCODE -ne 0) { Write-Error "ASan caught a memory violation (exit $LASTEXITCODE) — see the stacks above"; exit $LASTEXITCODE }
          Write-Host "MSVC ASan boundary fuzz: survived clean."

  # Static analysis (cppcheck). Report-only: it annotates findings and writes them
  # to the run summary but does NOT fail the build (continue-on-error), because
  # cppcheck versions drift between runner images. The committed baseline is clean,
  # so any annotation here is a new finding worth a look. To make it blocking later,
  # drop continue-on-error. Gated like the other heavy jobs; vendored code excluded.
  cppcheck:
    name: Static analysis (cppcheck, report-only)
    # Shared gate: auto in the free public mirror; manual/release-gate only in private.
    if: >-
      github.event.repository.private == false ||
      github.event_name == 'workflow_dispatch' ||
      inputs.full
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install cppcheck
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends cppcheck

      - name: Run cppcheck (warning severity, MXB config, vendor excluded)
        run: |
          cppcheck --version
          # --platform=win64 gives correct type sizes; --max-configs=1 + a fixed
          # config avoids the combinatorial #ifdef explosion; vendored libs skipped.
          cppcheck --quiet --enable=warning --inline-suppr --std=c++17 --language=c++ \
            --platform=win64 --max-configs=1 -DGAME_MXBIKES=1 -D_WIN32=1 \
            -I mxbmrp3 -i mxbmrp3/vendor \
            --suppress=missingInclude --suppress=missingIncludeSystem \
            --suppressions-list=.cppcheck-suppressions \
            --template='{file}:{line}: {severity}: {message} [{id}]' \
            -j"$(nproc)" mxbmrp3 2> cppcheck.txt || true
          if [ -s cppcheck.txt ]; then
            { echo "## cppcheck findings (report-only)"; echo; echo '```'; cat cppcheck.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::cppcheck reported $(wc -l < cppcheck.txt) finding(s) — see the job summary"
            cat cppcheck.txt
          else
            echo "cppcheck: no findings" | tee -a "$GITHUB_STEP_SUMMARY"
          fi
