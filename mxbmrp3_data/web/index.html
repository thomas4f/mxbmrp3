<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MXBMRP3 Overlay</title>
    <link rel="stylesheet" href="style.css">
    <!-- Your overrides (loads last, wins). Copy custom-sample.css to custom.css
         to get started; absent by default, so this 404s harmlessly. -->
    <link rel="stylesheet" href="custom.css">
</head>
<body>
    <div id="overlay">
        <!-- Logo Slideshow -->
        <div id="logo-banner" class="hidden">
            <div id="logo-track">
                <!-- Populated by JavaScript from /api/logos -->
            </div>
        </div>

        <!-- Header -->
        <div id="header">
            <div id="header-left">
                <span id="session-time" class="time">--:--</span>
            </div>
            <div id="header-right">
                <span id="session-type"></span>
                <span id="session-info"></span>
            </div>
        </div>

        <!-- Standings -->
        <div id="standings-container">
            <div id="standings-header">
                <span id="header-title">Behind Leader</span>
                <span id="header-gap">Gap</span>
            </div>
            <div id="standings-body">
                <!-- Populated by JavaScript -->
            </div>
            <!-- Fastest Last Lap Times — races only. Slides up over the bottom
                 rows of the tower on an interval, then slides back down. -->
            <div id="fastlap-panel" class="hidden">
                <div class="fastlap-inner">
                    <div class="fastlap-title">Fastest Last Lap Times</div>
                    <div id="fastlap-list">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
            </div>
            <!-- Fastest Laps — races. Leaderboard of each rider's best lap of
                 the session (rank 1 = overall fastest lap). -->
            <div id="bestlap-panel" class="hidden">
                <div class="bestlap-inner">
                    <div class="bestlap-title">Fastest Laps</div>
                    <div id="bestlap-list">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
            </div>
            <!-- Best Sectors — non-races only. Who owns the fastest time in each
                 sector (S1/S2/S3…) across the session. Slides up like the lap boards. -->
            <div id="sectors-panel" class="hidden">
                <div class="sectors-inner">
                    <div class="sectors-viewport">
                        <div class="sectors-track">
                            <!-- Per-sector pages (each carries its own .sectors-title as
                                 its first row) populated by JavaScript, so the header
                                 slides in with its board. -->
                        </div>
                    </div>
                </div>
            </div>
            <!-- Session Charts — a carousel of race-progression line charts (lap
                 chart / race trace / gap / pace), one chart per page, each drawn as
                 an inline SVG. Slides up like the sectors board; auto-shows when the
                 leader finishes (races) and is forceable via hotkey. -->
            <div id="charts-panel" class="hidden">
                <div class="charts-inner">
                    <div class="charts-viewport">
                        <div class="charts-track">
                            <!-- Per-chart SVG pages (each carries its own .charts-title as
                                 its first row) populated by JavaScript, so the header
                                 slides in with its chart. -->
                        </div>
                    </div>
                </div>
            </div>
            <!-- Down the Order — races/sessions with a compact tower. Pages
                 through the riders hidden below the Max Riders cutoff. -->
            <div id="tail-panel" class="hidden">
                <div class="tail-inner">
                    <div class="tail-title">Down the Order</div>
                    <div class="tail-viewport">
                        <div class="tail-track">
                            <!-- Pages populated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
            <!-- Battle — races. Highlights a cluster of riders running close
                 together (e.g. "Battle for 4th"). -->
            <div id="battle-panel" class="hidden">
                <div class="battle-inner">
                    <!-- #battle-list holds one .battle-track per battle; each track's
                         first child is its own .battle-title, so the headline slides
                         with its rows on a battle→battle cut (built by JavaScript). -->
                    <div id="battle-list">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Event Log -->
        <div id="event-log">
            <!-- Populated by JavaScript -->
        </div>
    </div>

    <!-- Rider Focus Card (shown when spectating). Single rider styled like a
         battle card; suppressed entirely for battle shots (the battle cards
         already cover those). -->
    <div id="focus-card" class="hidden">
        <!-- Director story caption (e.g. "FASTEST LAP"); hidden when no story. -->
        <div class="focus-banner" hidden></div>
        <!-- Body mirrors a single battle card: it reuses the battle/tower classes
             verbatim (.battle-sub / .battle-main / .col-num / .num-badge /
             .brand-strip) so the plate, name and rows match the rest of the
             overlay exactly. The .focus-* classes are JS hooks. The .battle-card
             class is not used (the focus card keeps its own translucent background
             for compositing over gameplay), but the big .battle-value headline IS
             reused (.focus-value) so the position shows large on the middle-right,
             exactly like a battle card; the brand gradient is applied inline by
             the overlay (overlay-focus.js). -->
        <div class="focus-body">
            <!-- Dim detail rows: bike, last lap, best lap, ideal lap. Each row is
                 toggled on/off by the overlay (overlay-focus.js) (like the battle card); Ideal is off by
                 default. The .focus-row-* class is the per-row JS toggle hook. -->
            <div class="battle-sub focus-row-bike"><span class="battle-sub-label focus-bike"></span></div>
            <div class="battle-sub focus-row-last"><span class="battle-sub-label">Last</span><span class="battle-sub-val battle-sub-time focus-last-lap"></span></div>
            <div class="battle-sub focus-row-best"><span class="battle-sub-label">Best</span><span class="battle-sub-val battle-sub-time focus-best-lap"></span></div>
            <div class="battle-sub focus-row-ideal"><span class="battle-sub-label">Ideal</span><span class="battle-sub-val battle-sub-time focus-ideal"></span></div>
            <!-- Brand-tinted identity strip: plate + name (position shows in the
                 headline on the right, not here). -->
            <div class="battle-main focus-ident">
                <span class="col-num"><span class="num-badge focus-num"></span><span class="brand-strip focus-strip"></span></span>
                <span class="battle-name focus-name"></span>
            </div>
            <!-- Large position ordinal on the middle-right, floating over the detail
                 rows above the name strip — same headline as a battle card. -->
            <div class="battle-value focus-value"></div>
        </div>
    </div>

    <!-- Settings -->
    <button id="settings-gear" class="settings-gear" aria-label="Settings"></button>
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <span class="settings-title">Settings</span>
            <button id="settings-close" class="settings-close" aria-label="Close">&times;</button>
        </div>
        <div class="settings-body">
            <!-- Populated by JS from CONFIG keys -->
        </div>
    </div>

    <!-- Overlay client, split from the former monolithic app.js into focused
         files. These are ordered CLASSIC scripts that share one global scope,
         so load order matters — keep it in sync with PRECACHE_URLS in sw.js. -->
    <script src="js/overlay-config.js"></script>
    <script src="js/overlay-shell.js"></script>
    <script src="js/overlay-connection.js"></script>
    <script src="js/overlay-util.js"></script>
    <script src="js/overlay-render.js"></script>
    <script src="js/overlay-focus.js"></script>
    <script src="js/overlay-slots.js"></script>
    <script src="js/overlay-panels.js"></script>
    <script src="js/overlay-charts.js"></script>
    <script src="js/overlay-settings.js"></script>
    <script src="js/overlay-demo.js"></script>
</body>
</html>
